server:
  port: 8082


spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cv_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password:         # اتركها فاضية لو XAMPP بدون password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
  mvc:
    pathmatch:
      use-suffix-pattern: false


auth:
  service:
    url: http://localhost:8081
    servlet:
      trailing-slash: true

jwt:
  secret: "cv-builder-super-secret-key-2024-change-in-production"
  expiration: 86400000